<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>📖 Diary Rayhze</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #fce9ec 0%, #fff3e6 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Quicksand', sans-serif;
      padding: 12px;
      margin: 0;
    }

    .buku-diary {
      max-width: 820px;
      width: 100%;
      background: #fff6ee;
      background-image: 
        linear-gradient(rgba(255, 210, 200, 0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 210, 200, 0.15) 1px, transparent 1px);
      background-size: 32px 32px;
      border-radius: 32px 32px 28px 28px;
      box-shadow: 0 24px 48px rgba(200, 120, 120, 0.25),
                  0 8px 20px rgba(200, 100, 100, 0.15),
                  inset 0 -8px 0 #f5c0b0;
      padding: 24px 20px 28px;
      position: relative;
      border: 5px solid #fad6c4;
      transition: all 0.3s ease;
    }

    .buku-diary::before {
      content: "🌸";
      position: absolute;
      top: -12px;
      left: 20px;
      font-size: 2.4rem;
      transform: rotate(-12deg);
      filter: drop-shadow(0 6px 8px rgba(255, 100, 130, 0.3));
      z-index: 2;
    }

    .buku-diary::after {
      content: "🧸";
      position: absolute;
      bottom: -12px;
      right: 20px;
      font-size: 2.8rem;
      transform: rotate(10deg);
      filter: drop-shadow(0 6px 8px rgba(255, 130, 130, 0.3));
      z-index: 2;
    }

    /* ===== PROFIL ===== */
    .profil-container {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #fff8f0;
      padding: 12px 18px 12px 12px;
      border-radius: 80px 80px 40px 40px;
      border: 3px solid #fad0c0;
      box-shadow: inset 0 -4px 0 #eeb8a8, 0 6px 14px rgba(200, 120, 120, 0.12);
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .profil-avatar {
      flex-shrink: 0;
      width: 68px;
      height: 68px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid #fbb8a8;
      box-shadow: 0 4px 10px rgba(200, 100, 100, 0.2);
      background: #ffe0d0;
    }

    .profil-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .profil-info {
      flex: 1;
      min-width: 120px;
    }

    .profil-info .nama {
      font-size: 1.25rem;
      font-weight: 700;
      color: #7a3f4a;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .profil-info .nama .nick {
      font-weight: 600;
      color: #b86070;
      font-size: 0.85rem;
      background: #ffded0;
      padding: 2px 14px;
      border-radius: 60px;
      border: 2px solid #fbb8a8;
    }

    .profil-info .bio {
      font-size: 0.85rem;
      color: #8f5a62;
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .profil-info .bio .birth,
    .profil-info .bio .mbti {
      background: #ffded0;
      padding: 2px 14px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.75rem;
      color: #7a404a;
      border: 2px solid #fbb8a8;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .profil-info .quote {
      font-size: 0.8rem;
      color: #a56a72;
      font-weight: 500;
      margin-top: 2px;
      font-style: italic;
    }

    .profil-info .quote i {
      color: #d4868a;
      margin-right: 4px;
    }

    /* ===== HEADER ===== */
    .header-buku {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      border-bottom: 4px dashed #fbc2b0;
      padding-bottom: 10px;
      flex-wrap: wrap;
    }

    .judul-buku {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .judul-buku h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #b8556b;
      text-shadow: 5px 5px 0 #ffe0d4;
      line-height: 1.1;
    }

    .judul-buku i {
      font-size: 2.4rem;
      color: #e87a8e;
      animation: goyang 2.5s infinite ease-in-out;
    }

    /* ===== SLIDE ===== */
    .halaman-buku {
      background: #fffcf5;
      border-radius: 40px 40px 30px 30px;
      padding: 10px 6px 6px;
      box-shadow: inset 0 0 0 3px #ffe0d0, 0 14px 24px -10px rgba(180, 90, 90, 0.2);
      border: 2px solid #ffd4be;
      margin: 6px 0 10px;
      position: relative;
      overflow: hidden;
      touch-action: pan-y;
    }

    .slide-container {
      display: flex;
      align-items: stretch;
      transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      will-change: transform;
      min-height: 280px;
      padding: 4px 0;
    }

    .slide-item {
      flex: 0 0 100%;
      padding: 16px 18px 18px;
      background: #fffbf5;
      border-radius: 30px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 240px;
      box-shadow: inset 0 0 0 1px #fce1d4;
      margin: 0 4px;
    }

    .slide-item .emoji-dekor {
      font-size: 2.8rem;
      text-align: center;
      filter: drop-shadow(0 4px 4px rgba(255, 120, 120, 0.2));
      margin-bottom: 4px;
    }

    .slide-item .isi-catatan {
      font-size: 1.2rem;
      font-weight: 600;
      color: #392a2a;
      line-height: 1.7;
      word-break: break-word;
      background: rgba(255, 235, 220, 0.3);
      padding: 14px 18px;
      border-radius: 60px 60px 30px 30px;
      border-left: 12px solid #fbaa9a;
      box-shadow: 0 2px 6px rgba(255, 150, 130, 0.1);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 120px;
    }

    .slide-item .tanggal-catatan {
      display: inline-block;
      background: #ffded0;
      padding: 5px 16px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.9rem;
      color: #7a404a;
      border: 2px solid #fbb8a8;
      box-shadow: inset 0 -3px 0 #cf9284;
      margin-top: 10px;
      align-self: center;
    }

    .slide-item .tanggal-catatan i {
      margin-right: 8px;
      color: #d86a7a;
    }

    /* ===== NAVIGASI ===== */
    .nav-slide {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-top: 16px;
      padding: 4px 0;
      flex-wrap: wrap;
    }

    .btn-nav {
      background: #ffdad0;
      border: 4px solid #fbb8a8;
      padding: 10px 22px;
      border-radius: 80px;
      font-weight: 700;
      font-size: 1.1rem;
      color: #743f4a;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: all 0.15s;
      cursor: pointer;
      box-shadow: 0 6px 0 #c5887a;
      background: #ffd4c4;
      font-family: 'Quicksand', sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .btn-nav:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #c5887a;
    }

    .btn-nav i {
      font-size: 1.4rem;
      color: #a54b5a;
    }

    .btn-nav:disabled {
      opacity: 0.4;
      transform: translateY(3px);
      box-shadow: 0 3px 0 #c5887a;
      pointer-events: none;
      filter: grayscale(0.3);
    }

    .indikator-halaman {
      background: #ffded2;
      padding: 4px 18px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      color: #804a52;
      border: 2px solid #fbb8a8;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: inset 0 -3px 0 #cf9284;
      min-width: 80px;
      justify-content: center;
    }

    .indikator-halaman i {
      color: #e6757a;
    }

    /* ===== AKSI ===== */
    .aksi-lucu {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .btn-lucu {
      background: #ffdbd0;
      border: 3px solid #f8b0a0;
      padding: 10px 20px;
      border-radius: 80px;
      font-weight: 700;
      font-size: 1rem;
      color: #5f3340;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: all 0.15s;
      cursor: pointer;
      box-shadow: 0 5px 0 #c28272;
      background: #ffe0d0;
      font-family: 'Quicksand', sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .btn-lucu:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #c28272;
    }

    .btn-lucu i {
      font-size: 1.4rem;
      color: #b3535a;
    }

    /* ===== ANIMASI ===== */
    @keyframes goyang {
      0%, 100% { transform: rotate(-4deg) scale(1); }
      50% { transform: rotate(6deg) scale(1.08); }
    }

    /* ===== RESPONSIVE ===== */
    /* Tablet & HP besar */
    @media (max-width: 768px) {
      .buku-diary {
        padding: 20px 16px 24px;
        border-width: 4px;
      }
      .buku-diary::before {
        font-size: 2rem;
        top: -10px;
        left: 14px;
      }
      .buku-diary::after {
        font-size: 2.2rem;
        bottom: -10px;
        right: 14px;
      }
      .profil-container {
        padding: 10px 14px 10px 10px;
        gap: 12px;
        border-width: 3px;
      }
      .profil-avatar {
        width: 56px;
        height: 56px;
        border-width: 3px;
      }
      .profil-info .nama {
        font-size: 1.1rem;
      }
      .profil-info .bio {
        font-size: 0.75rem;
        gap: 8px;
      }
      .profil-info .bio .birth,
      .profil-info .bio .mbti {
        font-size: 0.7rem;
        padding: 1px 10px;
      }
      .profil-info .quote {
        font-size: 0.7rem;
      }
      .judul-buku h1 {
        font-size: 1.6rem;
      }
      .judul-buku i {
        font-size: 2rem;
      }
      .slide-item .isi-catatan {
        font-size: 1.05rem;
        padding: 12px 14px;
        min-height: 100px;
      }
      .slide-item .tanggal-catatan {
        font-size: 0.8rem;
        padding: 4px 14px;
      }
      .btn-nav {
        padding: 8px 16px;
        font-size: 0.95rem;
        border-width: 3px;
        box-shadow: 0 5px 0 #c5887a;
      }
      .btn-nav i {
        font-size: 1.2rem;
      }
      .btn-lucu {
        padding: 8px 16px;
        font-size: 0.9rem;
        border-width: 3px;
        box-shadow: 0 4px 0 #c28272;
      }
      .btn-lucu i {
        font-size: 1.2rem;
      }
      .indikator-halaman {
        font-size: 0.9rem;
        padding: 4px 14px;
        min-width: 70px;
      }
    }

    /* HP kecil */
    @media (max-width: 480px) {
      .buku-diary {
        padding: 14px 10px 18px;
        border-width: 3px;
        border-radius: 24px;
      }
      .buku-diary::before {
        font-size: 1.6rem;
        top: -8px;
        left: 10px;
      }
      .buku-diary::after {
        font-size: 1.8rem;
        bottom: -8px;
        right: 10px;
      }
      .profil-container {
        padding: 8px 10px 8px 8px;
        gap: 10px;
        border-radius: 60px 60px 30px 30px;
        border-width: 2px;
      }
      .profil-avatar {
        width: 46px;
        height: 46px;
        border-width: 3px;
      }
      .profil-info .nama {
        font-size: 0.95rem;
        gap: 4px;
      }
      .profil-info .nama .nick {
        font-size: 0.7rem;
        padding: 1px 10px;
      }
      .profil-info .bio {
        font-size: 0.65rem;
        gap: 6px;
      }
      .profil-info .bio .birth,
      .profil-info .bio .mbti {
        font-size: 0.6rem;
        padding: 1px 8px;
        gap: 4px;
      }
      .profil-info .quote {
        font-size: 0.6rem;
      }
      .judul-buku h1 {
        font-size: 1.3rem;
        text-shadow: 3px 3px 0 #ffe0d4;
      }
      .judul-buku i {
        font-size: 1.6rem;
      }
      .header-buku {
        margin-bottom: 10px;
        padding-bottom: 8px;
        border-width: 3px;
      }
      .halaman-buku {
        border-radius: 28px 28px 20px 20px;
        padding: 6px 4px 4px;
        border-width: 2px;
        margin: 4px 0 6px;
      }
      .slide-container {
        min-height: 220px;
        padding: 2px 0;
      }
      .slide-item {
        padding: 10px 10px 12px;
        min-height: 180px;
        border-radius: 20px;
        margin: 0 2px;
      }
      .slide-item .emoji-dekor {
        font-size: 2.2rem;
      }
      .slide-item .isi-catatan {
        font-size: 0.9rem;
        padding: 10px 12px;
        min-height: 80px;
        border-left-width: 8px;
        border-radius: 40px 40px 20px 20px;
      }
      .slide-item .tanggal-catatan {
        font-size: 0.7rem;
        padding: 3px 10px;
        margin-top: 6px;
        border-width: 2px;
      }
      .slide-item .tanggal-catatan i {
        margin-right: 4px;
      }
      .nav-slide {
        gap: 10px;
        margin-top: 12px;
      }
      .btn-nav {
        padding: 6px 12px;
        font-size: 0.8rem;
        border-width: 3px;
        box-shadow: 0 4px 0 #c5887a;
        gap: 6px;
      }
      .btn-nav i {
        font-size: 1rem;
      }
      .btn-nav:active {
        transform: translateY(3px);
        box-shadow: 0 1px 0 #c5887a;
      }
      .indikator-halaman {
        font-size: 0.75rem;
        padding: 3px 12px;
        min-width: 60px;
        border-width: 2px;
        gap: 4px;
      }
      .aksi-lucu {
        gap: 8px;
        margin-top: 14px;
      }
      .btn-lucu {
        padding: 6px 14px;
        font-size: 0.8rem;
        border-width: 2px;
        box-shadow: 0 3px 0 #c28272;
        gap: 6px;
      }
      .btn-lucu i {
        font-size: 1rem;
      }
      .btn-lucu:active {
        transform: translateY(3px);
        box-shadow: 0 0px 0 #c28272;
      }
    }

    @media (max-width: 360px) {
      .profil-avatar {
        width: 40px;
        height: 40px;
      }
      .profil-info .nama {
        font-size: 0.85rem;
      }
      .profil-info .bio {
        font-size: 0.6rem;
      }
      .judul-buku h1 {
        font-size: 1.1rem;
      }
      .slide-item .isi-catatan {
        font-size: 0.8rem;
        padding: 8px 10px;
      }
      .btn-nav {
        font-size: 0.7rem;
        padding: 4px 10px;
      }
      .btn-lucu {
        font-size: 0.7rem;
        padding: 4px 12px;
      }
    }

    /* Layar besar (PC) - tetap nyaman */
    @media (min-width: 1024px) {
      .buku-diary {
        padding: 32px 28px 36px;
      }
      .profil-container {
        padding: 16px 24px 16px 16px;
        gap: 20px;
      }
      .profil-avatar {
        width: 80px;
        height: 80px;
        border-width: 5px;
      }
      .profil-info .nama {
        font-size: 1.5rem;
      }
      .profil-info .bio {
        font-size: 1rem;
      }
      .profil-info .quote {
        font-size: 0.95rem;
      }
      .judul-buku h1 {
        font-size: 2.5rem;
      }
      .slide-item .isi-catatan {
        font-size: 1.4rem;
        padding: 20px 28px;
        min-height: 150px;
      }
      .btn-nav {
        padding: 14px 34px;
        font-size: 1.3rem;
      }
      .btn-lucu {
        padding: 14px 28px;
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="buku-diary" id="bukuDiary">

    <!-- ===== PROFIL ===== -->
    <div class="profil-container">
      <div class="profil-avatar">
        <img src="https://i.pinimg.com/736x/d5/14/8f/d5148f198717d4b80f9012316f768e32.jpg" alt="Foto profil Rayhze" loading="lazy">
      </div>
      <div class="profil-info">
        <div class="nama">
          Rayhze Aelvra Fyloria
          <span class="nick">@Rayhze08</span>
        </div>
        <div class="bio">
          <span class="birth"><i class="fas fa-cake-candles"></i> 27 Dec 2009</span>
          <span class="mbti"><i class="fas fa-feather"></i> INFP-T</span>
        </div>
        <div class="quote">
          <i class="fas fa-heart" style="color: #e6737a;"></i> ๑ᵔ⤙ᵔ๑ Soft heart, steady steps
        </div>
      </div>
    </div>

    <!-- ===== HEADER ===== -->
    <div class="header-buku">
      <div class="judul-buku">
        <i class="fas fa-book-open"></i>
        <h1>Diaryku</h1>
      </div>
      <div style="font-size: 1.6rem; opacity: 0.5;">✨</div>
    </div>

    <!-- ===== SLIDE ===== -->
    <div class="halaman-buku" id="halamanBuku">
      <div class="slide-container" id="slideContainer">
        <!-- diisi JS -->
      </div>
    </div>

    <!-- ===== NAVIGASI ===== -->
    <div class="nav-slide">
      <button class="btn-nav" id="prevBtn" aria-label="Halaman sebelumnya">
        <i class="fas fa-chevron-left"></i> <span class="nav-label">Sebelum</span>
      </button>
      <div class="indikator-halaman">
        <i class="fas fa-bookmark"></i>
        <span id="pageIndicator">1 / 3</span>
      </div>
      <button class="btn-nav" id="nextBtn" aria-label="Halaman berikutnya">
        <span class="nav-label">Selanjutnya</span> <i class="fas fa-chevron-right"></i>
      </button>
    </div>

    <!-- ===== AKSI ===== -->
    <div class="aksi-lucu">
      <button class="btn-lucu" id="acakBtn"><i class="fas fa-shuffle"></i> Acak</button>
      <button class="btn-lucu" id="loncatBtn"><i class="fas fa-arrow-right"></i> Akhir</button>
      <button class="btn-lucu" id="resetBtn"><i class="fas fa-home"></i> Awal</button>
    </div>
  </div>

  <script>
    (function() {
      // ----- DATA DIARY -----
      const entries = [
        { 
          emoji: '🌸', 
          text: 'Hari ini ketemu kucing oren gemoy! Dia ngeong-ngeong minta digendong. Akhirnya aku gendong seharian~ 🐱',
          date: '17 Juli 2026'
        },
        { 
          emoji: '🍕', 
          text: 'Makan pizza sambil nonton kartun. Keju nya meleleh dan aku ketawa-ketiwi sendiri. Best day ever! ✨',
          date: '18 Juli 2026'
        },
        { 
          emoji: '☁️', 
          text: 'Awan bentuknya kayak kelinci raksasa. Aku tersenyum sendiri di taman. Langit biru banget hari ini. 🌤️',
          date: '19 Juli 2026'
        },
        { 
          emoji: '🧁', 
          text: 'Bikin cupcake hujan-hujan. Rumah wangi vanila. Aku dan adik comot creamnya pake jari, hihi! 🧁',
          date: '20 Juli 2026'
        },
        { 
          emoji: '🌈', 
          text: 'Pelangi muncul setelah hujan. Warnanya cerah banget. Aku foto dan kirim ke teman. Mereka bilang "gemoy!"',
          date: '21 Juli 2026'
        },
        { 
          emoji: '🦄', 
          text: 'Mimpi naik unicorn ke bulan. Di sana aku ketemu alien imut yang jual boba. Mimpi aneh tapi lucu! 🌙',
          date: '22 Juli 2026'
        }
      ];

      // ----- STATE -----
      let currentIndex = 0;
      const totalSlides = entries.length;
      let isTransitioning = false;

      // ----- DOM -----
      const slideContainer = document.getElementById('slideContainer');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const pageIndicator = document.getElementById('pageIndicator');
      const acakBtn = document.getElementById('acakBtn');
      const loncatBtn = document.getElementById('loncatBtn');
      const resetBtn = document.getElementById('resetBtn');
      const halamanBuku = document.getElementById('halamanBuku');

      // ----- RENDER -----
      function renderSlides() {
        if (!slideContainer) return;
        let html = '';
        entries.forEach((entry, idx) => {
          html += `
            <div class="slide-item" data-slide-index="${idx}">
              <div class="emoji-dekor">${entry.emoji}</div>
              <div class="isi-catatan">
                ${entry.text}
                <span class="tanggal-catatan"><i class="fas fa-calendar-alt"></i> ${entry.date}</span>
              </div>
            </div>
          `;
        });
        slideContainer.innerHTML = html;
        updateSlidePosition(false);
        updateIndikatorDanTombol();
      }

      // ----- UPDATE POSISI -----
      function updateSlidePosition(animate = true) {
        if (!slideContainer) return;
        if (!animate) {
          slideContainer.style.transition = 'none';
        } else {
          slideContainer.style.transition = 'transform 0.5s cubic-bezier(0.23, 1, 0.32, 1)';
        }
        slideContainer.style.transform = `translateX(${-currentIndex * 100}%)`;
        if (!animate) {
          // Force reflow
          void slideContainer.offsetHeight;
          slideContainer.style.transition = 'transform 0.5s cubic-bezier(0.23, 1, 0.32, 1)';
        }
      }

      // ----- UPDATE INDIKATOR -----
      function updateIndikatorDanTombol() {
        if (pageIndicator) {
          pageIndicator.textContent = `${currentIndex + 1} / ${totalSlides}`;
        }
        if (prevBtn) prevBtn.disabled = (currentIndex === 0);
        if (nextBtn) nextBtn.disabled = (currentIndex === totalSlides - 1);
      }

      // ----- NAVIGASI -----
      function goToSlide(index) {
        if (isTransitioning) return;
        if (index < 0) index = 0;
        if (index >= totalSlides) index = totalSlides - 1;
        if (index === currentIndex) return;

        isTransitioning = true;
        currentIndex = index;
        updateSlidePosition(true);
        updateIndikatorDanTombol();

        setTimeout(() => {
          isTransitioning = false;
        }, 550);
      }

      function nextSlide() {
        if (currentIndex < totalSlides - 1) goToSlide(currentIndex + 1);
      }

      function prevSlide() {
        if (currentIndex > 0) goToSlide(currentIndex - 1);
      }

      // ----- AKSI -----
      function acakHalaman() {
        if (totalSlides <= 1) return;
        let randomIndex;
        let attempts = 0;
        do {
          randomIndex = Math.floor(Math.random() * totalSlides);
          attempts++;
        } while (randomIndex === currentIndex && totalSlides > 1 && attempts < 20);
        goToSlide(randomIndex);
      }

      function lompatKeAkhir() {
        goToSlide(totalSlides - 1);
      }

      function keAwal() {
        goToSlide(0);
      }

      // ----- SWIPE / TOUCH -----
      let startX = 0;
      let startY = 0;
      let isSwiping = false;
      let isSwipingHorizontal = false;

      function handleTouchStart(e) {
        const touch = e.touches[0];
        startX = touch.clientX;
        startY = touch.clientY;
        isSwiping = true;
        isSwipingHorizontal = false;
      }

      function handleTouchMove(e) {
        if (!isSwiping) return;
        const touch = e.touches[0];
        const diffX = touch.clientX - startX;
        const diffY = touch.clientY - startY;

        // Tentukan arah swipe setelah pergerakan cukup
        if (!isSwipingHorizontal && (Math.abs(diffX) > 15 || Math.abs(diffY) > 15)) {
          if (Math.abs(diffX) > Math.abs(diffY)) {
            isSwipingHorizontal = true;
          } else {
            isSwiping = false; // vertikal, biarkan scroll normal
          }
        }

        if (isSwipingHorizontal) {
          e.preventDefault();
          // Efek drag ringan
          const offset = -currentIndex * 100 + (diffX / halamanBuku.offsetWidth) * 100;
          slideContainer.style.transition = 'none';
          slideContainer.style.transform = `translateX(${offset}%)`;
        }
      }

      function handleTouchEnd(e) {
        if (!isSwiping || !isSwipingHorizontal) {
          isSwiping = false;
          return;
        }

        const touch = e.changedTouches[0];
        const diffX = touch.clientX - startX;
        const threshold = halamanBuku.offsetWidth * 0.2;

        if (Math.abs(diffX) > threshold) {
          if (diffX < 0 && currentIndex < totalSlides - 1) {
            goToSlide(currentIndex + 1);
          } else if (diffX > 0 && currentIndex > 0) {
            goToSlide(currentIndex - 1);
          } else {
            updateSlidePosition(true);
          }
        } else {
          updateSlidePosition(true);
        }

        isSwiping = false;
        isSwipingHorizontal = false;
      }

      // ----- INIT -----
      function init() {
        renderSlides();

        // Event listeners
        if (prevBtn) prevBtn.addEventListener('click', prevSlide);
        if (nextBtn) nextBtn.addEventListener('click', nextSlide);
        if (acakBtn) acakBtn.addEventListener('click', acakHalaman);
        if (loncatBtn) loncatBtn.addEventListener('click', lompatKeAkhir);
        if (resetBtn) resetBtn.addEventListener('click', keAwal);

        // Keyboard
        document.addEventListener('keydown', function(e) {
          if (e.key === 'ArrowLeft') {
            e.preventDefault();
            prevSlide();
          } else if (e.key === 'ArrowRight') {
            e.preventDefault();
            nextSlide();
          }
        });

        // Touch events untuk swipe
        if (halamanBuku) {
          halamanBuku.addEventListener('touchstart', handleTouchStart, { passive: true });
          halamanBuku.addEventListener('touchmove', handleTouchMove, { passive: false });
          halamanBuku.addEventListener('touchend', handleTouchEnd, { passive: true });
          halamanBuku.addEventListener('touchcancel', function() {
            isSwiping = false;
            isSwipingHorizontal = false;
            updateSlidePosition(true);
          }, { passive: true });
        }

        // Resize handling - pastikan slide tetap di posisi
        let resizeTimeout;
        window.addEventListener('resize', function() {
          clearTimeout(resizeTimeout);
          resizeTimeout = setTimeout(() => {
            updateSlidePosition(true);
          }, 100);
        });
      }

      init();
    })();
  </script>
</body>
</html>
